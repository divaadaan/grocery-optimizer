# Paper's small-scale setup: full fine-tune of SmolLM-135M.
# Run prepare_data with --sample 100000 to match the paper's small-scale corpus.
model_name: HuggingFaceTB/SmolLM-135M
output_dir: training/runs/smollm-135m-full
data_dir: training/data/foodcom

learning_rate: 2e-5        # paper small-scale: 2e-5 (also tried 1e-6)
num_train_epochs: 3        # paper doesn't state epochs for small-scale; 1 epoch was used at large scale
per_device_train_batch_size: 8   # 8 x 4 accum = effective batch 32 (paper: batch 32, grad accum 4)
gradient_accumulation_steps: 4
warmup_steps: 100
weight_decay: 0.01
optim: adamw_torch
precision: fp16
max_length: 512            # paper: 99.4% of recipes fit in 512 tokens
eval_steps: 500
report_to: none            # set to mlflow to log alongside the app's runs

qlora:
  enabled: false
