services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://192.168.3.104:6379
      CELERY_BROKER_URL: redis://192.168.3.104:6379
      CELERY_RESULT_BACKEND: redis://192.168.3.104:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
