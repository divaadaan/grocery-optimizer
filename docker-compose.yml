services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # DOCKER_OLLAMA_URL (set in .env) points at an Ollama outside the compose
      # network, e.g. one on the Windows host. Unset, it falls back to the
      # containerized ollama service — start it with: docker compose --profile ollama up
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_URL:-http://ollama:11434}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_started
    restart: unless-stopped

  # Containerized Ollama — opt-in via: docker compose --profile ollama up
  # Not needed when DOCKER_OLLAMA_URL points at a host-side Ollama.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # For NVIDIA GPU acceleration, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # One-shot: pulls the models configured in .env (defaults match config.py)
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHEF_MODEL: ${OLLAMA_CHEF_MODEL:-smollm:1.7b}
      OLLAMA_SOUS_CHEF_MODEL: ${OLLAMA_SOUS_CHEF_MODEL:-smollm:360m}
      OLLAMA_NUTRITIONIST_MODEL: ${OLLAMA_NUTRITIONIST_MODEL:-smollm:360m}
    entrypoint: >
      /bin/sh -c "
      ollama pull $$OLLAMA_CHEF_MODEL &&
      ollama pull $$OLLAMA_SOUS_CHEF_MODEL &&
      ollama pull $$OLLAMA_NUTRITIONIST_MODEL
      "
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    restart: unless-stopped

volumes:
  ollama_models:
  mlflow_data:
